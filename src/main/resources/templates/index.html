<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TP13 - OAuth2 Google</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center">
<div class="max-w-md w-full bg-white rounded-2xl shadow-2xl overflow-hidden">
    <!-- Header -->
    <div class="bg-gradient-to-r from-blue-600 to-indigo-600 px-8 py-10 text-center text-white">
        <h1 class="text-4xl font-bold mb-2">Bienvenue</h1>
        <p class="text-blue-100">TP13 - Authentification avec Google</p>
    </div>

    <!-- Content -->
    <div class="p-8">
        <div class="text-center mb-8">
            <p class="text-gray-600 text-lg">
                Connectez-vous avec votre compte Google pour accéder à votre profil
            </p>
        </div>

        <a th:href="@{/oauth2/authorization/google}"
           class="flex items-center justify-center gap-3 bg-white border-2 border-gray-300 hover:border-blue-500 hover:shadow-md transition-all duration-300 text-gray-700 font-semibold py-4 px-6 rounded-xl text-lg w-full">
            <img src="https://www.google.com/images/branding/googleg/1x/googleg_standard_color_64dp.png"
                 alt="Google" width="24" height="24">
            Se connecter avec Google
        </a>

        <p class="text-center text-xs text-gray-500 mt-8">
            TP13 - Spring Boot + OAuth2 + OpenID Connect
        </p>
    </div>
</div>
</body>
</html>
