<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Profil</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen py-12">
<div class="max-w-md mx-auto">
    <div class="bg-white rounded-3xl shadow-xl overflow-hidden">

        <!-- Header -->
        <div class="h-32 bg-gradient-to-r from-blue-600 to-indigo-600"></div>

        <!-- Avatar -->
        <div class="flex justify-center -mt-16">
            <img th:src="${picture}"
                 th:alt="${name}"
                 class="w-32 h-32 rounded-2xl border-4 border-white shadow-lg object-cover"
                 th:if="${picture != null}">
            <div th:if="${picture == null}"
                 class="w-32 h-32 bg-gray-200 rounded-2xl border-4 border-white shadow-lg flex items-center justify-center text-5xl">
                👤
            </div>
        </div>

        <!-- Informations -->
        <div class="px-8 pb-10 pt-4 text-center">
            <h2 class="text-3xl font-bold text-gray-800" th:text="${name} ?: 'Utilisateur'"></h2>
            <p class="text-gray-500 mt-1" th:text="${email}"></p>

            <div class="mt-8 grid grid-cols-1 gap-4">
                <div class="bg-gray-50 rounded-2xl p-5 text-left">
                    <p class="text-sm text-gray-500">Nom complet</p>
                    <p class="font-medium text-gray-800" th:text="${name} ?: 'Non disponible'"></p>
                </div>
                <div class="bg-gray-50 rounded-2xl p-5 text-left">
                    <p class="text-sm text-gray-500">Email</p>
                    <p class="font-medium text-gray-800" th:text="${email} ?: 'Non disponible'"></p>
                </div>
            </div>

            <!-- Bouton Déconnexion -->
            <a th:href="@{/logout}"
               class="mt-10 block w-full bg-red-500 hover:bg-red-600 transition-colors text-white font-semibold py-4 rounded-2xl text-center">
                Se déconnecter
            </a>
        </div>
    </div>

    <!-- Footer -->
    <p class="text-center text-gray-400 text-sm mt-6">
        TP13 - OAuth2 + OpenID Connect avec Google
    </p>
</div>
</body>
</html>
